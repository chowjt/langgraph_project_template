# ============================================
# Docker Compose - 生产环境编排
# 包含：应用 + PostgreSQL + Redis
# ============================================

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: langgraph-app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - CHECKPOINTER_TYPE=postgres
      - DATABASE_URI=postgresql://langgraph:langgraph@postgres:5432/langgraph
      - REDIS_URI=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - langgraph-net

  postgres:
    image: postgres:16-alpine
    container_name: langgraph-postgres
    environment:
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: langgraph
      POSTGRES_DB: langgraph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph -d langgraph"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - langgraph-net

  redis:
    image: redis:7-alpine
    container_name: langgraph-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - langgraph-net

volumes:
  postgres_data:

networks:
  langgraph-net:
    driver: bridge
